<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  
  <!-- دایره پس‌زمینه مشکی -->
  <circle cx="50" cy="50" r="48" fill="#000000"/>
  
  <!-- حرف R - دقیقاً وسط دایره با محاسبه دقیق -->
  <g transform="translate(33, 21)" fill="#4ade80">
    
    <!-- ساقه عمودی -->
    <rect x="0" y="0" width="3" height="58" rx="1"/>
    <rect x="6" y="0" width="3" height="58" rx="1"/>
    <rect x="12" y="0" width="3" height="58" rx="1"/>
    
    <!-- حلقه R -->
    <rect x="0" y="0" width="3" height="28" rx="1"/>
    <rect x="6" y="0" width="3" height="28" rx="1"/>
    <rect x="12" y="0" width="3" height="28" rx="1"/>
    <rect x="18" y="3" width="3" height="24" rx="1"/>
    <rect x="24" y="8" width="3" height="18" rx="1"/>
    
    <!-- پایه اریب R -->
    <line x1="3" y1="38" x2="20" y2="58" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
    <line x1="9" y1="38" x2="26" y2="58" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="38" x2="32" y2="58" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>